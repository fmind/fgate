repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier --check
        language: system
        entry: npx --no-install prettier --check
        types_or: [markdown, json, yaml]
      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: system
        entry: npx --no-install markdownlint-cli2
        files: '\.md$'
        pass_filenames: false
